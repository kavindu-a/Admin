<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Admin Panel | Live MongoDB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto; }
        body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; padding: 2rem 1.5rem; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { margin-bottom: 2rem; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1.5rem; }
        h1 { font-size: 1.9rem; background: linear-gradient(120deg, #c084fc, #60a5fa); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .stats { background: rgba(15,23,42,0.7); backdrop-filter: blur(8px); border-radius: 2rem; padding: 0.5rem 1rem; display: flex; gap: 1.5rem; }
        .stat-item { display: flex; align-items: baseline; gap: 0.5rem; color: #e2e8f0; }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: #facc15; }
        .add-card { background: rgba(30,41,59,0.6); backdrop-filter: blur(12px); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; }
        .add-form { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; }
        .input-group { flex: 2; min-width: 220px; }
        .input-group label { display: block; font-size: 0.8rem; color: #cbd5e1; margin-bottom: 0.4rem; }
        .input-group input { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 0.8rem 1rem; border-radius: 1rem; color: white; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 2rem; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: linear-gradient(95deg, #8b5cf6, #6d28d9); color: white; }
        .btn-primary:hover { transform: scale(0.98); }
        .table-container { background: rgba(15,23,42,0.5); border-radius: 1.5rem; overflow-x: auto; padding: 0.5rem; }
        table { width: 100%; border-collapse: collapse; color: #e2e8f0; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .bot-number { background: #0f172a; padding: 0.2rem 0.8rem; border-radius: 2rem; font-family: monospace; }
        .badge-active { background: #10b98120; color: #34d399; padding: 0.25rem 0.75rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 600; }
        .badge-inactive { background: #ef444420; color: #f87171; padding: 0.25rem 0.75rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 600; }
        .toggle-switch { position: relative; display: inline-block; width: 52px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; border-radius: 34px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(26px); }
        .delete-btn { background: none; border: none; color: #f87171; font-size: 1.2rem; cursor: pointer; padding: 5px 8px; border-radius: 2rem; }
        .delete-btn:hover { background: #dc262620; }
        .error-msg { color: #f87171; text-align: center; padding: 2rem; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; background: #1e293b; border-left: 4px solid #10b981; padding: 0.8rem 1.5rem; border-radius: 1rem; color: white; animation: slideIn 0.2s ease; z-index: 1000; }
        .toast.error { border-left-color: #ef4444; }
        @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        footer { margin-top: 2rem; text-align: center; color: #475569; font-size: 0.75rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div><h1>🤖 Bot Fleet Manager</h1><p>Live connection to MongoDB Atlas</p></div>
        <div class="stats">
            <div class="stat-item">📦 TOTAL <span class="stat-number" id="totalCount">0</span></div>
            <div class="stat-item">✅ ACTIVE <span class="stat-number" id="activeCount">0</span></div>
        </div>
    </div>

    <div class="add-card">
        <form id="addBotForm" class="add-form">
            <div class="input-group">
                <label>📞 Add New Bot Number</label>
                <input type="text" id="botNumberInput" placeholder="e.g., @MyBot, +123456789, BOT_001" required>
            </div>
            <button type="submit" class="btn btn-primary">➕ Add Bot</button>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead><tr><th>#</th><th>Bot Number</th><th>Status</th><th>Toggle</th><th>Action</th></tr></thead>
            <tbody id="botsTableBody"><tr><td colspan="5" style="text-align:center">Loading bots from MongoDB...</td></tr></tbody>
        </table>
    </div>
    <footer>🔐 Connected to MongoDB Atlas • Real-time sync</footer>
</div>

<script>
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function refreshStats() {
        try {
            const res = await fetch('/api/stats');
            if (!res.ok) throw new Error();
            const stats = await res.json();
            document.getElementById('totalCount').innerText = stats.total;
            document.getElementById('activeCount').innerText = stats.activeCount;
        } catch(e) { console.warn('Stats fetch failed'); }
    }

    async function loadBots() {
        try {
            const res = await fetch('/api/bots');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const bots = await res.json();
            renderTable(bots);
            refreshStats();
        } catch (err) {
            console.error(err);
            document.getElementById('botsTableBody').innerHTML = `<tr><td colspan="5" class="error-msg">❌ Failed to load bots. Is server running? Check console for details.</td></tr>`;
            showToast('⚠️ Cannot connect to backend. Make sure node server.js is running.', true);
        }
    }

    function renderTable(bots) {
        const tbody = document.getElementById('botsTableBody');
        if (!bots.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">✨ No bot numbers found. Add your first one! ✨</td></tr>';
            return;
        }
        let html = '';
        bots.forEach((bot, idx) => {
            const activeBadge = bot.active ? '<span class="badge-active">● ACTIVE</span>' : '<span class="badge-inactive">○ INACTIVE</span>';
            html += `
                <tr data-id="${bot._id}">
                    <td>${idx+1}</td>
                    <td><span class="bot-number">${escapeHtml(bot.botNumber)}</span></td>
                    <td>${activeBadge}</td>
                    <td><label class="toggle-switch"><input type="checkbox" class="toggle-active" data-id="${bot._id}" ${bot.active ? 'checked' : ''}><span class="slider"></span></label></td>
                    <td><button class="delete-btn" data-id="${bot._id}" data-number="${escapeHtml(bot.botNumber)}">🗑️ Delete</button></td>
                </tr>
            `;
        });
        tbody.innerHTML = html;

        // Attach toggle events
        document.querySelectorAll('.toggle-active').forEach(toggle => {
            toggle.addEventListener('change', async (e) => {
                const id = toggle.dataset.id;
                const newStatus = toggle.checked;
                try {
                    const res = await fetch(`/api/bots/${id}/active`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ active: newStatus })
                    });
                    if (!res.ok) throw new Error();
                    showToast(`Bot status changed to ${newStatus ? 'ACTIVE' : 'INACTIVE'}`);
                    loadBots();
                } catch (err) {
                    showToast('Failed to update status', true);
                    toggle.checked = !newStatus;
                }
            });
        });

        // Attach delete events
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.dataset.id;
                const number = btn.dataset.number;
                if (confirm(`Delete bot "${number}" permanently?`)) {
                    try {
                        const res = await fetch(`/api/bots/${id}`, { method: 'DELETE' });
                        if (!res.ok) throw new Error();
                        showToast(`🗑️ Bot "${number}" deleted`);
                        loadBots();
                    } catch (err) {
                        showToast('Delete failed', true);
                    }
                }
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    document.getElementById('addBotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('botNumberInput');
        const botNumber = input.value.trim();
        if (!botNumber) return showToast('Please enter a bot number', true);
        const btn = document.querySelector('#addBotForm .btn-primary');
        const original = btn.innerText;
        btn.innerText = 'Adding...';
        btn.disabled = true;
        try {
            const res = await fetch('/api/bots', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ botNumber })
            });
            if (!res.ok) {
                const errData = await res.json();
                throw new Error(errData.message || 'Add failed');
            }
            showToast(`✅ Bot "${botNumber}" added!`);
            input.value = '';
            loadBots();
        } catch (err) {
            showToast(`⚠️ ${err.message}`, true);
        } finally {
            btn.innerText = original;
            btn.disabled = false;
        }
    });

    // Initial load
    loadBots();
    setInterval(loadBots, 10000);
</script>
</body>
</html>
