<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bot Admin Panel | Bot Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1.5rem;
        }

        .title h1 {
            color: white;
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(120deg, #c084fc, #60a5fa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .title p {
            color: #94a3b8;
            margin-top: 0.3rem;
            font-size: 0.9rem;
        }

        .stats-badge {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            gap: 1.5rem;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            color: #e2e8f0;
        }

        .stat-label {
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            color: #9ca3af;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #facc15;
            line-height: 1;
        }

        .add-bot-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
        }

        .add-form {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .input-group {
            flex: 2;
            min-width: 220px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.4rem;
        }

        .input-group input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139,92,246,0.3);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        .btn-primary {
            background: linear-gradient(95deg, #8b5cf6, #6d28d9);
            color: white;
            box-shadow: 0 4px 12px rgba(107, 70, 193, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(95deg, #7c3aed, #5b21b6);
            transform: scale(0.98);
        }

        .bots-table-container {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            overflow-x: auto;
            padding: 0.5rem;
        }

        .bots-table {
            width: 100%;
            border-collapse: collapse;
            color: #e2e8f0;
        }

        .bots-table th {
            text-align: left;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            font-weight: 600;
            color: #a5b4fc;
        }

        .bots-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .bot-number {
            font-family: monospace;
            background: #0f172a;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.85rem;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: 0.3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #10b981;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .badge-active {
            background: #10b98120;
            color: #34d399;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-inactive {
            background: #ef444420;
            color: #f87171;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .delete-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #f87171;
            transition: 0.2s;
            padding: 5px 8px;
            border-radius: 2rem;
        }

        .delete-btn:hover {
            background: #dc262620;
            color: #ffa2a2;
        }

        .empty-row td {
            text-align: center;
            padding: 3rem;
            color: #64748b;
            font-style: italic;
        }

        .toast-message {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            backdrop-filter: blur(12px);
            border-left: 4px solid #10b981;
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.2s ease;
        }

        .toast-error {
            border-left-color: #ef4444;
        }

        @keyframes slideIn {
            from { transform: translateX(40px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .stat-number { font-size: 1.3rem; }
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            color: #475569;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <div class="title">
            <h1>🤖 Bot Fleet Manager</h1>
            <p>Admin panel • Add, delete & monitor bot numbers</p>
        </div>
        <div class="stats-badge">
            <div class="stat-item">
                <span class="stat-label">📦 TOTAL BOTS</span>
                <span class="stat-number" id="totalCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">✅ ACTIVE BOTS</span>
                <span class="stat-number" id="activeCount">0</span>
            </div>
        </div>
    </div>

    <div class="add-bot-card">
        <form id="addBotForm" class="add-form">
            <div class="input-group">
                <label>📞 BOT NUMBER (ID / Phone / Username)</label>
                <input type="text" id="botNumberInput" placeholder="e.g., @MyBot, +123456789, BOT_001" autocomplete="off" required>
            </div>
            <button type="submit" class="btn btn-primary">➕ Add Bot Number</button>
        </form>
        <p style="font-size: 0.7rem; color: #5b6e8c; margin-top: 0.7rem;">* New bots are automatically activated</p>
    </div>

    <div class="bots-table-container">
        <table class="bots-table">
            <thead>
                <tr><th>#</th><th>Bot Number</th><th>Status</th><th>Active Toggle</th><th>Actions</th></tr>
            </thead>
            <tbody id="botsTableBody">
                <tr class="empty-row"><td colspan="5">Loading bots...</td></tr>
            </tbody>
        </table>
    </div>
    <footer>🔐 MongoDB Atlas • Real-time sync</footer>
</div>

<script>
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast-message ${isError ? 'toast-error' : ''}`;
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 400);
        }, 2800);
    }

    async function refreshStats() {
        try {
            const res = await fetch('/api/stats');
            if (!res.ok) throw new Error();
            const stats = await res.json();
            document.getElementById('totalCount').innerText = stats.total || 0;
            document.getElementById('activeCount').innerText = stats.activeCount || 0;
        } catch (err) {
            console.error(err);
        }
    }

    async function fetchBotsAndRender() {
        try {
            const res = await fetch('/api/bots');
            if (!res.ok) throw new Error('Failed to fetch');
            const bots = await res.json();
            renderBotsTable(bots);
            await refreshStats();
        } catch (error) {
            document.getElementById('botsTableBody').innerHTML = '<tr class="empty-row"><td colspan="5">❌ Failed to load data. Check server.</td></tr>';
        }
    }

    function renderBotsTable(bots) {
        const tbody = document.getElementById('botsTableBody');
        if (!bots.length) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="5">✨ No bots registered. Add your first bot number ✨</td></tr>';
            return;
        }
        let html = '';
        bots.forEach((bot, idx) => {
            const activeStatus = bot.active;
            const statusBadge = activeStatus ? '<span class="badge-active">● ACTIVE</span>' : '<span class="badge-inactive">○ INACTIVE</span>';
            html += `
                <tr data-id="${bot._id}">
                    <td>${idx + 1}</td>
                    <td><span class="bot-number">${escapeHtml(bot.botNumber)}</span></td>
                    <td>${statusBadge}</td>
                    <td>
                        <label class="toggle-switch">
                            <input type="checkbox" class="toggle-active" data-id="${bot._id}" ${activeStatus ? 'checked' : ''}>
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td><button class="delete-btn" data-id="${bot._id}" data-number="${escapeHtml(bot.botNumber)}">🗑️ Delete</button></td>
                </tr>
            `;
        });
        tbody.innerHTML = html;

        document.querySelectorAll('.toggle-active').forEach(toggle => {
            toggle.addEventListener('change', async (e) => {
                const botId = toggle.getAttribute('data-id');
                const newStatus = toggle.checked;
                try {
                    const res = await fetch(`/api/bots/${botId}/active`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ active: newStatus })
                    });
                    if (!res.ok) throw new Error();
                    showToast(`✅ Bot status updated to ${newStatus ? 'ACTIVE' : 'INACTIVE'}`);
                    await fetchBotsAndRender();
                } catch (err) {
                    showToast(`❌ Update failed`, true);
                    await fetchBotsAndRender();
                }
            });
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const botId = btn.getAttribute('data-id');
                const botNumber = btn.getAttribute('data-number');
                if (confirm(`⚠️ Permanently delete bot "${botNumber}"?`)) {
                    try {
                        const res = await fetch(`/api/bots/${botId}`, { method: 'DELETE' });
                        if (!res.ok) throw new Error();
                        showToast(`🗑️ Bot "${botNumber}" deleted`);
                        await fetchBotsAndRender();
                    } catch (err) {
                        showToast(`❌ Delete failed`, true);
                    }
                }
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('addBotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('botNumberInput');
        const botNumber = input.value.trim();
        if (!botNumber) {
            showToast('❌ Bot number cannot be empty', true);
            return;
        }
        const btn = document.querySelector('#addBotForm .btn-primary');
        const originalText = btn.innerText;
        btn.innerText = 'Adding...';
        btn.disabled = true;
        try {
            const res = await fetch('/api/bots', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ botNumber })
            });
            if (!res.ok) {
                const errData = await res.json();
                throw new Error(errData.message || 'Failed to add');
            }
            showToast(`🎉 Bot "${botNumber}" added!`);
            input.value = '';
            await fetchBotsAndRender();
        } catch (err) {
            showToast(`⚠️ ${err.message}`, true);
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    });

    fetchBotsAndRender();
    setInterval(fetchBotsAndRender, 15000);
</script>
</body>
  </html>
